name: MinerTogglePlus
version: '${project.version}'
main: com.minertoggleplus.MinerTogglePlus
api-version: '1.21'
description: Feature-rich toggle utility plugin for miners
author: [ItzMR_L3MON]
prefix: MinerToggle+

commands:
  minertoggle:
    description: Main MinerToggle+ command
    usage: /mt <toggle|status|admin|help>
    aliases: [ mt, mtp ]

permissions:
  minertoggleplus.use:
    description: Access to all player toggles
    default: op
  minertoggleplus.toggle.vein_miner:
    description: Use Vein Miner
    default: op
  minertoggleplus.toggle.tree_capitator:
    description: Use Tree Capitator
    default: op
  minertoggleplus.toggle.auto_smelt:
    description: Use Auto Smelt
    default: op
  minertoggleplus.toggle.auto_replant:
    description: Use Auto Replant
    default: op
  minertoggleplus.toggle.silk_spawners:
    description: Use Silk Spawners
    default: op
  minertoggleplus.toggle.double_drops:
    description: Use Double Drops
    default: op
  minertoggleplus.toggle.auto_pickup:
    description: Use Auto Pickup
    default: op
  minertoggleplus.toggle.cave_vision:
    description: Use Cave Vision
    default: op
  minertoggleplus.toggle.auto_torch:
    description: Use Auto Torch
    default: op
  minertoggleplus.toggle.no_fall_damage:
    description: Use No Fall Damage
    default: op
  minertoggleplus.toggle.ore_radar:
    description: Use Ore Radar (nearby ore notifications)
    default: op
  minertoggleplus.toggle.xp_boost:
    description: Use XP Boost on ore mining
    default: op
  minertoggleplus.admin:
    description: Access to admin toggles (ClearLagg, mob drops, etc.)
    default: op
